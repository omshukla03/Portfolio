<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Shukla Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
body{
    background-color: rgb(0, 0, 33);
    color: white;
    font-family: 'Poppins',sans-serif;
}
nav{
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 70px;
    background-color: rgb(2, 2, 88);
}
nav ul{
    display: flex;
    justify-content: center;
}
nav ul li{
    list-style-type: none;
    margin: 0 23px;
}
nav ul li a{
    text-decoration: none;
    color: white;
}
nav ul li a:hover{
    color: rgb(153, 153, 226);
    font-size: 1.02rem;
}
.left{
    font-size: 1.5rem;
}
.firstSection{
    display: flex;
    justify-content: space-around;
    margin: 125px 0;
    align-items: center;
}
.firstSection >div{
    width: 30%;
}
main hr{
    border: 0;
    background: #9c97f1;
    height: 1.2px;
    margin: 40px 84px;
}
.leftSection{
    font-size: 3rem ;
}
.rightSection img{ 
    margin: -55px -160px;
}
.purple{
    color:rgb(170,107,228);
}
#element{
    color:rgb(170,107,228);
}
.secondSection{
     max-width: 80vw;
     margin:auto ;
}
</style>
</head>
<body>
    <header>
        <nav>
            <div class="left">Om Shukla</div> 
            <div class="right">
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Services</a></li>
                    <li><a href="">Projects</a></li>
                    <li><a href="">Contact me</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="firstSection">
            <div class="leftSection">
                Hi, My Name is <span class="purple">Om   </span>
               <div>And I am an Eager </div>
               
               <span id="element"></span>
            </div>
            <div class="rightSection">
                <img src="\images\profile.png" alt="profile">
            </div>
        </section>
        <hr>
        <section class="secondSection">
            <h1>Work Experience</h1>
        </section>
    </main>
    
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <!-- Setup and start animation! -->
   <script>
        var typed = new Typed('#element', {
          strings: ['Java Developer', 'UI/UX Designer','Video Editor'],
          typeSpeed: 50,
        });
      </script>
</body>
</html>
